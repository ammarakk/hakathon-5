# k8s/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nur-scents-api-hpa
  namespace: nur-scents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nur-scents-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nur-scents-worker-hpa
  namespace: nur-scents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nur-scents-worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

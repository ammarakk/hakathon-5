# k8s/redis.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nurscents-redis
  namespace: nur-scents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nurscents-redis
  template:
    metadata:
      labels:
        app: nurscents-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nurscents-redis
  namespace: nur-scents
spec:
  selector:
    app: nurscents-redis
  ports:
  - port: 6379
    targetPort: 6379

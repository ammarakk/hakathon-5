# k8s/deployment-api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nur-scents-api
  namespace: nur-scents
  labels:
    app: nur-scents-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nur-scents-api
  template:
    metadata:
      labels:
        app: nur-scents-api
    spec:
      containers:
      - name: api
        image: nur-scents-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: nur-scents-config
        - secretRef:
            name: nur-scents-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

# k8s/deployment-worker.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nur-scents-worker
  namespace: nur-scents
  labels:
    app: nur-scents-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nur-scents-worker
  template:
    metadata:
      labels:
        app: nur-scents-worker
    spec:
      containers:
      - name: worker
        image: nur-scents-worker:latest
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: nur-scents-config
        - secretRef:
            name: nur-scents-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
